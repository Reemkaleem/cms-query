<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Equipment Supplier Q&amp;A</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 14px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f8ef7, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
    header p  { font-size: 0.75rem; color: #64748b; margin-top: 1px; }
    .pill {
      margin-left: auto;
      background: #1e2535;
      border: 1px solid #2d3148;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .pill span { color: #4ade80; font-weight: 600; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* empty state */
    .empty-state {
      margin: auto;
      text-align: center;
      color: #475569;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h2 { font-size: 1.1rem; color: #64748b; margin-bottom: 8px; }
    .empty-state p  { font-size: 0.83rem; line-height: 1.6; max-width: 420px; }
    .examples {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 16px;
    }
    .example-btn {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.78rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all .15s;
    }
    .example-btn:hover { border-color: #4f8ef7; color: #e2e8f0; background: #1e2a3a; }

    /* messages */
    .msg { display: flex; gap: 12px; max-width: 820px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .user .avatar { background: #1e40af; }
    .bot  .avatar { background: linear-gradient(135deg, #4f8ef7, #a855f7); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.875rem;
      line-height: 1.65;
      max-width: 700px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble { background: #1e40af; border-top-right-radius: 3px; }
    .bot  .bubble { background: #1a1d27; border: 1px solid #2d3148; border-top-left-radius: 3px; }

    /* Markdown-rendered content inside bot bubbles */
    .bot .bubble p  { margin: 0 0 8px; }
    .bot .bubble p:last-child { margin-bottom: 0; }
    .bot .bubble ul, .bot .bubble ol { margin: 6px 0 10px 20px; }
    .bot .bubble li { margin-bottom: 4px; line-height: 1.6; }
    .bot .bubble strong { color: #f1f5f9; font-weight: 600; }
    .bot .bubble em { color: #94a3b8; }
    .bot .bubble code { background: #0f172a; border: 1px solid #1e2535; border-radius: 4px; padding: 1px 5px; font-size: 0.82em; color: #7dd3fc; font-family: monospace; }
    .bot .bubble pre { background: #0f172a; border: 1px solid #1e2535; border-radius: 6px; padding: 10px 14px; overflow-x: auto; margin: 8px 0; }
    .bot .bubble pre code { background: none; border: none; padding: 0; font-size: 0.85em; }
    .bot .bubble h1, .bot .bubble h2, .bot .bubble h3 { color: #e2e8f0; margin: 10px 0 6px; font-size: 0.95rem; }
    .bot .bubble blockquote { border-left: 3px solid #2d3148; margin: 8px 0; padding: 4px 12px; color: #94a3b8; }
    .bot .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.82em; }
    .bot .bubble th, .bot .bubble td { border: 1px solid #2d3148; padding: 5px 10px; text-align: left; }
    .bot .bubble th { background: #1e2535; color: #e2e8f0; }

    /* meta badge */
    .meta-badge {
      font-size: 0.7rem;
      background: #0f172a;
      border: 1px solid #1e2535;
      border-radius: 6px;
      padding: 3px 9px;
      color: #64748b;
      margin-bottom: 6px;
      display: inline-block;
    }
    .meta-badge b { color: #4ade80; }

    /* thinking indicator */
    .thinking {
      display: flex; align-items: center; gap: 8px;
      color: #64748b; font-size: 0.8rem; padding: 6px 0;
    }
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #4f8ef7;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:.4; }
      40%          { transform: translateY(-5px); opacity:1; }
    }

    /* ── Input bar ── */
    #input-bar {
      padding: 16px 24px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .input-wrap {
      max-width: 820px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    #q {
      flex: 1;
      resize: none;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.875rem;
      padding: 11px 14px;
      outline: none;
      font-family: inherit;
      min-height: 44px;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #q:focus { border-color: #4f8ef7; }
    #q::placeholder { color: #475569; }

    #send-btn {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border: none; border-radius: 10px;
      color: #fff; font-size: 18px;
      cursor: pointer; transition: opacity .15s;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    #hint { text-align: center; font-size: 0.68rem; color: #334155; margin-top: 8px; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">🏥</div>
  <div>
    <h1>Medical Equipment Suppliers</h1>
    <p>Powered by Ollama · gemma3:4b</p>
  </div>
  <div class="pill" id="stat-pill">Loading…</div>
</header>

<!-- ── Chat ───────────────────────────────────────────────────────────────── -->
<div id="chat">
  <div class="empty-state" id="empty">
    <div class="icon">🔍</div>
    <h2>Ask anything about the supplier database</h2>
    <p>Query 58,000+ medical equipment suppliers across the US using plain English — no search syntax needed.</p>
    <div class="examples">
      <button class="example-btn">Oxygen suppliers in Florida</button>
      <button class="example-btn">Suppliers in Las Vegas that accept assignment</button>
      <button class="example-btn">Prosthetics providers in Ohio</button>
      <button class="example-btn">CPAP suppliers near ZIP 33609</button>
      <button class="example-btn">How many suppliers are in Texas?</button>
      <button class="example-btn">Wheelchair suppliers in New York</button>
    </div>
  </div>
</div>

<!-- ── Input ───────────────────────────────────────────────────────────────── -->
<div id="input-bar">
  <div class="input-wrap">
    <textarea id="q" placeholder="Ask a question in plain English…" rows="1"></textarea>
    <button id="send-btn" title="Send">&#9658;</button>
  </div>
  <p id="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  // Configure marked for clean rendering
  marked.setOptions({ breaks: true, gfm: true });

  // ── Load stats ────────────────────────────────────────────────────────────
  fetch("/stats").then(r => r.json()).then(d => {
    document.getElementById("stat-pill").innerHTML =
      `<span>${d.total_rows.toLocaleString()}</span> suppliers`;
  }).catch(() => {});

  // ── Example buttons ───────────────────────────────────────────────────────
  document.querySelectorAll(".example-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.getElementById("q").value = btn.textContent;
      sendQuestion();
    });
  });

  // ── Keyboard ──────────────────────────────────────────────────────────────
  const qEl  = document.getElementById("q");
  const sendBtn = document.getElementById("send-btn");

  qEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });
  sendBtn.addEventListener("click", sendQuestion);

  // Auto-resize textarea
  qEl.addEventListener("input", () => {
    qEl.style.height = "auto";
    qEl.style.height = qEl.scrollHeight + "px";
  });

  // ── Chat helpers ──────────────────────────────────────────────────────────
  const chat = document.getElementById("chat");
  const empty = document.getElementById("empty");

  function appendMsg(role, text) {
    empty.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `
      <div class="avatar">${role === "user" ? "👤" : "🤖"}</div>
      <div>
        ${role === "bot" ? '<div class="meta-badge" id="mb-new" style="display:none"></div>' : ""}
        <div class="bubble">${escHtml(text)}</div>
      </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function appendThinking() {
    empty.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    wrap.id = "thinking";
    wrap.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="thinking">
        <div class="dots"><span></span><span></span><span></span></div>
        Filtering &amp; thinking…
      </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Main send function ────────────────────────────────────────────────────
  function sendQuestion() {
    const question = qEl.value.trim();
    if (!question) return;

    // Disable input while streaming
    qEl.value = "";
    qEl.style.height = "auto";
    sendBtn.disabled = true;

    appendMsg("user", question);
    const thinkEl = appendThinking();

    // Start SSE fetch
    fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    }).then(resp => {
      if (!resp.ok) throw new Error("Server error: " + resp.status);

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   botWrap = null;
      let   bubble  = null;
      let   metaBadge = null;
      let   buffer  = "";
      let   fullText = "";

      function read() {
        reader.read().then(({ done, value }) => {
          if (done) {
            sendBtn.disabled = false;
            qEl.focus();
            return;
          }

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = line.slice(6);

            if (payload === "[DONE]") {
              sendBtn.disabled = false;
              qEl.focus();
              return;
            }

            // First event: metadata
            if (payload.startsWith("__META__")) {
              const meta = JSON.parse(payload.slice(8));

              // Remove thinking indicator
              thinkEl.remove();

              // Create bot message bubble
              botWrap = document.createElement("div");
              botWrap.className = "msg bot";
              botWrap.innerHTML = `
                <div class="avatar">🤖</div>
                <div>
                  <div class="meta-badge"></div>
                  <div class="bubble"></div>
                </div>`;
              chat.appendChild(botWrap);
              metaBadge = botWrap.querySelector(".meta-badge");
              bubble    = botWrap.querySelector(".bubble");

              const filters = meta.filters || {};
              const filterSummary = [
                filters.state         ? `State: ${filters.state}` : null,
                filters.city          ? `City: ${filters.city}`   : null,
                filters.zip           ? `ZIP: ${filters.zip}`     : null,
                (filters.supply_keywords    || []).length ? `Supplies: ${filters.supply_keywords.join(", ")}` : null,
                (filters.specialty_keywords || []).length ? `Speciality: ${filters.specialty_keywords.join(", ")}` : null,
                filters.name_contains ? `Name: "${filters.name_contains}"` : null,
              ].filter(Boolean).join(" · ");

              metaBadge.innerHTML = `<b>${meta.count}</b> record${meta.count !== 1 ? "s" : ""} matched` +
                (filterSummary ? ` &nbsp;·&nbsp; ${filterSummary}` : "");

              chat.scrollTop = chat.scrollHeight;
              read();
              return;
            }

            // Streaming token
            if (!thinkEl.isConnected && !botWrap) {
              // Safety: thinking was already removed but bubble never created (edge case)
              thinkEl.remove();
              botWrap = appendMsg("bot", "");
              bubble  = botWrap.querySelector(".bubble");
            }

            // Decode escaped newlines
            const token = payload.replace(/\\n/g, "\n");
            fullText += token;
            if (bubble) bubble.innerHTML = marked.parse(fullText);
            chat.scrollTop = chat.scrollHeight;
          }

          read();
        });
      }

      read();
    }).catch(err => {
      thinkEl.remove();
      appendMsg("bot", "⚠️ Error: " + err.message);
      sendBtn.disabled = false;
    });
  }
</script>
</body>
</html>
